<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#f5f5f5',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-surface text-neutral-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full px-6 py-5 flex items-center justify-center">
        <span class="text-lg font-bold tracking-tight">Acme</span>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-4 sm:px-6 -mt-12">
        <div class="max-w-2xl w-full text-center space-y-8">

            <!-- Badge -->
            <div class="flex justify-center">
                <span class="inline-flex items-center px-4 py-1 rounded-full text-xs border border-neutral-300 bg-white text-neutral-700">
                    Join the waitlist!
                </span>
            </div>

            <!-- Heading -->
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">
                Something awesome<br class="hidden sm:block"> is coming soon
            </h1>

            <!-- Subheading -->
            <p class=" text-neutral-500 max-w-lg mx-auto leading-relaxed">
                We're building the next generation of our product. Be the first to know when we launch and get early access.
            </p>

            <!-- Tally Embed Form -->
            <div class="max-w-md mx-auto">
                <iframe data-tally-src="https://tally.so/embed/b5lBz0?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="174" frameborder="0" marginheight="0" marginwidth="0" title="From boilerplate"></iframe>
                <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
            </div>


            <!-- Social Proof -->
            <div class="pt-10 space-y-6">
                <p class="text-xs my-4 text-neutral-400 tracking-widest font-medium">As seen on</p>
                <div class="flex items-center justify-center gap-8 text-neutral-400">
                    <span class="text-sm font-bold tracking-tight flex items-center gap-1.5">
                        TechCrunch
                    </span>
                    <span class="text-sm font-bold tracking-tight flex items-center gap-1.5">
                        ProductHunt
                    </span>
                    <span class="text-sm font-bold tracking-tight flex items-center gap-1.5">
                        HackerNews
                    </span>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full px-6 py-6">
        <div class="max-w-5xl mx-auto flex items-center justify-center">
            <p class="text-xs text-neutral-400">
                &copy; 2026 Acme Inc. All rights reserved.
            </p>
        </div>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
